    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ---------------------------------------------------
           GLOBAL THEME
        --------------------------------------------------- */
        :root {
            --bg-light: #f5efe6;
            --bg-light-accent: #fff9f0;
            --text-light: #1a1a1a;
            --card-light: #ffffff;
            --border-light: #e0d4c2;

            --bg-dark: #05060a;
            --bg-dark-accent: #151821;
            --text-dark: #f5f5f5;
            --card-dark: #181b24;
            --border-dark: #2b3140;

            --primary: #c58b3b;
            --primary-soft: rgba(197,139,59,0.12);
            --accent: #ffb347;
            --danger: #ff4b6a;
            --success: #3ac97a;

            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 9px;

            --shadow-soft: 0 22px 55px rgba(0,0,0,0.16);
            --shadow-card: 0 14px 32px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.85), rgba(245,239,230,0.95)),
                radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(0,0,0,0.08), transparent 55%);
            z-index: -3;
        }

        body.dark-mode::before {
            background:
                radial-gradient(circle at 0% 0%, rgba(197,139,59,0.26), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(80,90,140,0.45), transparent 60%),
                linear-gradient(145deg, #05060a, #10131c);
        }

        /* Floating gradient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.55;
            z-index: -2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .blob-1 {
            width: 260px;
            height: 260px;
            background: rgba(197,139,59,0.55);
            top: -60px;
            left: -40px;
            animation: floatBlob1 18s ease-in-out infinite alternate;
        }

        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(255,179,71,0.45);
            bottom: -80px;
            right: -40px;
            animation: floatBlob2 22s ease-in-out infinite alternate;
        }

        body.dark-mode .blob-1 {
            background: rgba(197,139,59,0.75);
        }

        body.dark-mode .blob-2 {
            background: rgba(120,90,220,0.55);
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,40px) scale(1.1); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-40px,-30px) scale(1.05); }
        }

        /* ---------------------------------------------------
           HEADER + NAV
        --------------------------------------------------- */
        header {
            text-align: center;
            padding: 26px 7% 10px;
        }

        .logo-animate {
            max-width: 360px;
            border-radius: 14px;
            opacity: 0;
            transform: translateY(-12px) scale(0.98);
            animation: fadeInLogo 1.2s ease forwards;
            filter: drop-shadow(0 0 20px rgba(197,139,59,0.55));
        }

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: translateY(-12px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 7%;
            backdrop-filter: blur(18px);
            background: rgba(253,247,238,0.92);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        body.dark-mode nav {
            background: rgba(10,12,18,0.92);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        nav h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        nav a {
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: inherit;
            position: relative;
            padding-bottom: 3px;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.2s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        #theme-toggle {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        body.dark-mode #theme-toggle {
            background: rgba(15,17,25,0.95);
            border-color: rgba(255,255,255,0.12);
            color: var(--text-dark);
        }
        /* ---------------------------------------------------
           HERO SECTION
        --------------------------------------------------- */
        .hero {
            max-width: 1100px;
            margin: 18px auto 10px;
            padding: 0 7% 30px;
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.1fr);
            gap: 26px;
            align-items: center;
        }

        @media (max-width: 880px) {
            .hero {
                grid-template-columns: 1fr;
            }
        }

        .hero-left {
            position: relative;
        }

        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--primary-soft);
            font-size: 12px;
            margin-bottom: 10px;
            animation: floatUp 1.2s ease forwards;
            opacity: 0;
        }

        .hero-title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            margin: 4px 0 8px;
            line-height: 1.2;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideUp 1s ease forwards 0.15s;
        }

        .hero-subtitle {
            margin: 0 0 14px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideUp 1s ease forwards 0.25s;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideUp 1s ease forwards 0.35s;
        }

        .btn-primary {
            padding: 9px 18px;
            border-radius: 999px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(197,139,59,0.45);
            transform: translateY(0);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(197,139,59,0.55);
        }

        .btn-ghost {
            padding: 9px 16px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .btn-ghost:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            border-color: rgba(0,0,0,0.18);
        }

            border-color: rgba(255,255,255,0.16);
            color: var(--text-dark);
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 16px;
            font-size: 12px;
            opacity: 0;

            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

            position: relative;
            padding: 16px;
        }

            border-radius: var(--radius-lg);

            top: 14px;
            right: 16px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            background: rgba(197,139,59,0.16);
        }

        .hero-card-title {

            font-weight: 600;

        }

        .hero-card-sub {
            font-size: 13px;
            opacity: 0.85;
            margin: 0 0 10px;
        }

        .hero-card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .hero-mini-card {
            padding: 8px 10px;
            border-radius: var(--radius-md);
            background: rgba(0,0,0,0.03);
            font-size: 12px;
        }

        body.dark-mode .hero-mini-card {

            font-size: 11px;

        }

        .hero-mini-value {

        }

        .hero-orbit {
            position: absolute;
            inset: -10px;
            border-radius: var(--radius-lg);
            border: 1px dashed rgba(197,139,59,0.35);
            pointer-events: none;
            animation: orbitSpin 18s linear infinite;
        }

            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ---------------------------------------------------
           SECTIONS / FEATURE CARDS / PREVIEWS
        --------------------------------------------------- */

            opacity: 0;

            pointer-events: none;
        }

        .feature-card:hover .feature-highlight {
            opacity: 1;
        }

<script>
/* ---------------------------------------------------
   DARK MODE PERSISTENCE
--------------------------------------------------- */
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
}

const themeToggle = document.getElementById("theme-toggle");
function updateThemeButton() {
    themeToggle.textContent = document.body.classList.contains("dark-mode")
        ? "☀️ Light Mode"
        : "🌙 Dark Mode";
}
updateThemeButton();

themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem("theme",
        document.body.classList.contains("dark-mode") ? "dark" : "light"
    );
    updateThemeButton();
});

/* ---------------------------------------------------
   HERO ORBIT SPEED VARIATION
--------------------------------------------------- */
const orbit = document.querySelector(".hero-orbit");
let orbitSpeed = 18;

setInterval(() => {
    orbitSpeed = 14 + Math.random() * 10;
    orbit.style.animationDuration = orbitSpeed + "s";
}, 4000);

/* ---------------------------------------------------
   MICRO‑INTERACTIONS
--------------------------------------------------- */
// Magnetic buttons
document.querySelectorAll(".btn-primary, .btn-ghost").forEach(btn => {
    btn.addEventListener("mousemove", (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        btn.style.transform = `translate(${x * 0.08}px, ${y * 0.08}px)`;
    });

    btn.addEventListener("mouseleave", () => {
        btn.style.transform = "translate(0,0)";
    });
});

// Card tilt
document.querySelectorAll(".feature-card, .preview-card, .hero-card").forEach(card => {
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        card.style.transform = `rotateX(${y * -6}deg) rotateY(${x * 6}deg) scale(1.02)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "rotateX(0) rotateY(0) scale(1)";
    });
});

// Soft floating mini cards
function floatElement(el, intensity = 6, speed = 3000) {
    let y = 0;
    let direction = 1;
    setInterval(() => {
        y += direction * 0.4;
        if (Math.abs(y) >= intensity) direction *= -1;
        el.style.transform = `translateY(${y}px)`;
    }, speed / 120);
}

document.querySelectorAll(".hero-mini-card").forEach((card, i) => {
    floatElement(card, 4 + i, 2600 + i * 200);
});

/* ---------------------------------------------------
   SCROLL REVEAL
--------------------------------------------------- */
const revealEls = document.querySelectorAll(".reveal, .feature-card, .preview-card");
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("reveal-visible");
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.2 });

revealEls.forEach(el => observer.observe(el));

/* ---------------------------------------------------
   TUTORIAL PROGRESS (LOCALSTORAGE MOCK)
--------------------------------------------------- */
// You can later connect this to real data.
// For now, we simulate progress using localStorage key: "tutorialProgress"
const TOTAL_LEVELS = 20;
let completedLevels = parseInt(localStorage.getItem("tutorialProgress") || "0", 10);
if (completedLevels < 0) completedLevels = 0;
if (completedLevels > TOTAL_LEVELS) completedLevels = TOTAL_LEVELS;

const statLevels = document.getElementById("stat-levels");
const statPercent = document.getElementById("stat-percent");
const statFocus = document.getElementById("stat-focus");
const miniCompleted = document.getElementById("mini-completed");
const miniActive = document.getElementById("mini-active");
const miniStreak = document.getElementById("mini-streak");

function updateProgressUI() {
    const percent = Math.round((completedLevels / TOTAL_LEVELS) * 100);
    statLevels.textContent = `${completedLevels} / ${TOTAL_LEVELS}`;
    statPercent.textContent = `${percent}%`;
    miniCompleted.textContent = completedLevels.toString();
    const activeLevel = completedLevels < TOTAL_LEVELS ? completedLevels + 1 : TOTAL_LEVELS;
    miniActive.textContent = activeLevel.toString();
    statFocus.textContent = `Level ${activeLevel}`;
    miniStreak.textContent = `${Math.max(0, completedLevels)} days`;
}
updateProgressUI();

/* ---------------------------------------------------
   HERO PARALLAX
--------------------------------------------------- */
const heroCard = document.querySelector(".hero-card");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;
    heroCard.style.transform =
        `translateY(0) scale(1) rotateX(${y * -0.6}deg) rotateY(${x * 0.6}deg)`;
});

/* ---------------------------------------------------
   PERFORMANCE THROTTLE (SCROLL)
--------------------------------------------------- */
let ticking = false;
window.addEventListener("scroll", () => {
    if (!ticking) {
        window.requestAnimationFrame(() => {
            ticking = false;
        });
        ticking = true;
    }
});
</script>
