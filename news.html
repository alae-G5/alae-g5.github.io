<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaeAI — Tech & AI News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* -------------------- THEME VARIABLES -------------------- */
:root {
    --bg-light: #f5efe6;
    --bg-light-accent: #fff9f0;
    --text-light: #1a1a1a;
    --card-light: #ffffff;
    --border-light: #e0d4c2;

    --bg-dark: #0b0c10;
    --bg-dark-accent: #151821;
    --text-dark: #f5f5f5;
    --card-dark: #181b24;
    --border-dark: #2b3140;

    --primary: #c58b3b;
    --primary-soft: rgba(197,139,59,0.12);

    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
}

/* -------------------- GLOBAL -------------------- */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-light);
    color: var(--text-light);
    transition: background 0.4s ease, color 0.4s ease;
}

body.dark-mode {
    background: var(--bg-dark);
    color: var(--text-dark);
}

/* Background gradient */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(255,255,255,0.8), rgba(245,239,230,0.9)),
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.06), transparent 55%);
    z-index: -2;
}

body.dark-mode::before {
    background:
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(80,90,140,0.35), transparent 60%),
        linear-gradient(145deg, #05060a, #10131c);
}

/* -------------------- NAVBAR -------------------- */
nav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 7%;
    backdrop-filter: blur(18px);
    background: rgba(253,247,238,0.85);
    border-bottom: 1px solid rgba(0,0,0,0.04);
}

body.dark-mode nav {
    background: rgba(10,12,18,0.88);
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

nav h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 700;
}

nav a {
    margin-left: 22px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    color: inherit;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0;
    height: 2px;
    background: var(--primary);
    transition: width 0.2s ease;
}

nav a:hover::after {
    width: 100%;
}

#theme-toggle {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.9);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

body.dark-mode #theme-toggle {
    background: rgba(15,17,25,0.95);
    border-color: rgba(255,255,255,0.12);
    color: var(--text-dark);
}

/* -------------------- PAGE -------------------- */
.page {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 7%;
}

h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    margin-bottom: 20px;
}

/* -------------------- TOP BAR -------------------- */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

/* CATEGORY TABS */
.category-tabs {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

.category-tab {
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s ease;
    border: 1px solid transparent;
    font-size: 13px;
}

.category-tab.active {
    background: var(--primary);
    color: white;
}

.category-tab:hover {
    transform: translateY(-3px);
}

/* REFRESH BUTTON */
#refresh-btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    transition: 0.2s ease;
}

#refresh-btn:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

/* -------------------- TRENDING -------------------- */
.trending-box {
    background: var(--card-light);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 35px;
    box-shadow: var(--shadow-soft);
    animation: fadeIn 0.6s ease;
}

body.dark-mode .trending-box {
    background: var(--card-dark);
    border-color: var(--border-dark);
}

.trending-box h3 {
    margin: 0 0 10px;
    font-size: 18px;
    font-family: 'Poppins', sans-serif;
}

.trending-item {
    margin-bottom: 10px;
    font-size: 14px;
}

.trending-item a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

/* -------------------- NEWS GRID -------------------- */
.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

.news-card {
    background: var(--card-light);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 0;
    box-shadow: 0 10px 26px rgba(0,0,0,0.06);
    overflow: hidden;
    animation: fadeUp 0.5s ease;
}

body.dark-mode .news-card {
    background: var(--card-dark);
    border-color: var(--border-dark);
    box-shadow: 0 14px 32px rgba(0,0,0,0.55);
}

.news-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.news-card-content {
    padding: 16px;
}

.news-card h3 {
    margin: 0 0 8px;
    font-size: 17px;
    font-weight: 600;
}

.news-card p {
    margin: 0 0 12px;
    font-size: 14px;
    opacity: 0.85;
}

.news-card a {
    font-size: 14px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

/* LOADING / END TEXT */
#status-text {
    text-align: center;
    margin: 20px 0 0;
    font-size: 13px;
    opacity: 0.8;
}

/* -------------------- ANIMATIONS -------------------- */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* -------------------- FOOTER -------------------- */
footer {
    margin-top: 60px;
    padding: 30px 7%;
    text-align: center;
    font-size: 13px;
    background: rgba(253,247,238,0.9);
    border-top: 1px solid rgba(0,0,0,0.06);
}

body.dark-mode footer {
    background: rgba(8,10,16,0.95);
    border-top-color: rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="tools.html">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<div class="page">

    <h2>Latest Tech & AI News</h2>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="category-tabs">
            <div class="category-tab active" data-category="all">All</div>
            <div class="category-tab" data-category="ai">AI</div>
            <div class="category-tab" data-category="tech">Tech</div>
            <div class="category-tab" data-category="space">Space</div>
            <div class="category-tab" data-category="science">Science</div>
            <div class="category-tab" data-category="programming">Programming</div>
        </div>

        <button id="refresh-btn">⟳ Refresh</button>
    </div>

    <!-- TRENDING -->
    <div class="trending-box" id="trending-box">
        <h3>🔥 Trending</h3>
        <div id="trending-list"></div>
    </div>

    <!-- NEWS GRID -->
    <div id="news-container" class="news-grid">
        <p>Loading real news...</p>
    </div>

    <p id="status-text"></p>
</div>

<footer>
    © 2026 AlaeAI — All Rights Reserved
</footer>

<script>
/* -------------------- THEME SYSTEM -------------------- */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* -------------------- NEWS SYSTEM -------------------- */
let allArticles = [];
let currentCategory = "all";
let renderedCount = 0;
const CHUNK_SIZE = 8;
let isLoadingMore = false;

const RSS_SOURCES = [
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml",
    "https://techcrunch.com/feed/",
    "https://www.theverge.com/rss/index.xml",
    "https://www.wired.com/feed/rss"
];

async function loadNews() {
    const container = document.getElementById("news-container");
    const trendingList = document.getElementById("trending-list");
    const statusText = document.getElementById("status-text");

    container.innerHTML = "<p>Loading...</p>";
    trendingList.innerHTML = "";
    statusText.textContent = "";

    allArticles = [];
    renderedCount = 0;

    for (const url of RSS_SOURCES) {
        try {
            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
            const text = await response.text();

            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");

            items.forEach(item => {
                const title = item.querySelector("title")?.textContent || "No title";
                const description = item.querySelector("description")?.textContent || "No description";
                const link = item.querySelector("link")?.textContent || "#";

                const category = detectCategory(title + " " + description);
                const image = `https://source.unsplash.com/600x400/?${category},technology`;

                allArticles.push({ title, description, link, category, image });
            });

            if (allArticles.length > 0) break;

        } catch (err) {}
    }

    if (allArticles.length === 0) {
        container.innerHTML = "<p>Failed to load news.</p>";
        return;
    }

    // Trending
    allArticles.slice(0, 5).forEach(a => {
        trendingList.innerHTML += `
            <div class="trending-item">
                <a href="${a.link}" target="_blank">${a.title}</a>
            </div>
        `;
    });

    container.innerHTML = "";
    renderMoreArticles();
}

function detectCategory(text) {
    text = text.toLowerCase();
    if (text.includes("ai") || text.includes("artificial intelligence")) return "ai";
    if (text.includes("space") || text.includes("nasa")) return "space";
    if (text.includes("science") || text.includes("research")) return "science";
    if (text.includes("programming") || text.includes("developer") || text.includes("code")) return "programming";
    return "tech";
}

function renderMoreArticles() {
    const container = document.getElementById("news-container");
    const statusText = document.getElementById("status-text");

    const filtered = allArticles.filter(a => currentCategory === "all" || a.category === currentCategory);

    if (renderedCount === 0) container.innerHTML = "";

    const nextSlice = filtered.slice(renderedCount, renderedCount + CHUNK_SIZE);

    nextSlice.forEach(a => {
        const card = document.createElement("div");
        card.className = "news-card";
        card.setAttribute("data-category", a.category);

        card.innerHTML = `
            <img src="${a.image}" alt="News Image">
            <div class="news-card-content">
                <h3>${a.title}</h3>
                <p>${a.description}</p>
                <a href="${a.link}" target="_blank">Read more →</a>
            </div>
        `;

        container.appendChild(card);
    });

    renderedCount += nextSlice.length;

    if (renderedCount >= filtered.length) {
        statusText.textContent = "You reached the end.";
    } else {
        statusText.textContent = "Scroll to load more…";
    }

    isLoadingMore = false;
}

/* -------------------- CATEGORY FILTER -------------------- */
document.querySelectorAll(".category-tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        currentCategory = tab.dataset.category;
        renderedCount = 0;
        document.getElementById("status-text").textContent = "";
        renderMoreArticles();
    });
});

/* -------------------- INFINITE SCROLL -------------------- */
window.addEventListener("scroll", () => {
    if (isLoadingMore) return;

    const scrollPosition = window.innerHeight + window.scrollY;
    const threshold = document.body.offsetHeight - 400;

    if (scrollPosition >= threshold) {
        isLoadingMore = true;
        renderMoreArticles();
    }
});

/* -------------------- REFRESH BUTTON -------------------- */
document.getElementById("refresh-btn").addEventListener("click", () => {
    loadNews();
});

/* -------------------- INIT -------------------- */
loadNews();
</script>

</body>
</html>
