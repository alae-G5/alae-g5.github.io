<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaeAI — Tech & AI News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* -----------------------------------------------------------
   GLOBAL VARIABLES
----------------------------------------------------------- */
:root {
    --bg-light: #f5efe6;
    --bg-light-accent: #fff9f0;
    --text-light: #1a1a1a;
    --card-light: #ffffff;
    --border-light: #e0d4c2;

    --bg-dark: #05060a;
    --bg-dark-accent: #10131c;
    --text-dark: #f5f5f5;
    --card-dark: #151821;
    --border-dark: #2b3140;

    --primary: #c58b3b;
    --primary-soft: rgba(197,139,59,0.12);

    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
}

/* -----------------------------------------------------------
   GLOBAL STYLES
----------------------------------------------------------- */
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: var(--bg-light);
    color: var(--text-light);
    transition: background 0.3s, color 0.3s;
}

.dark-mode {
    background: var(--bg-dark);
    color: var(--text-dark);
}

/* -----------------------------------------------------------
   NAVBAR
----------------------------------------------------------- */
nav {
    width: 100%;
    padding: 18px 40px;
    background: var(--card-light);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
    transition: background 0.3s, border-color 0.3s;
}

.dark-mode nav {
    background: var(--card-dark);
    border-color: var(--border-dark);
}

nav .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
}

nav .links a {
    margin-left: 22px;
    text-decoration: none;
    color: inherit;
    font-weight: 500;
    transition: 0.2s;
}

nav .links a:hover {
    color: var(--primary);
}

/* -----------------------------------------------------------
   PAGE TITLE
----------------------------------------------------------- */
.page-title {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin-top: 40px;
}

/* -----------------------------------------------------------
   CATEGORY BAR
----------------------------------------------------------- */
.category-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 25px;
    flex-wrap: wrap;
}

.category-tab {
    padding: 10px 18px;
    border-radius: var(--radius-md);
    background: var(--primary-soft);
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.category-tab.active {
    background: var(--primary);
    color: white;
}

/* -----------------------------------------------------------
   REFRESH + DARK MODE BUTTONS
----------------------------------------------------------- */
.top-controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
}

#refresh-btn {
    padding: 10px 18px;
    background: var(--primary);
    color: white;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-weight: 600;
    border: none;
}

#dark-toggle {
    font-size: 22px;
    cursor: pointer;
    user-select: none;
}

/* -----------------------------------------------------------
   TRENDING SECTION
----------------------------------------------------------- */
.trending-box {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    background: var(--card-light);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
    transition: 0.3s;
}

.dark-mode .trending-box {
    background: var(--card-dark);
    border-color: var(--border-dark);
}

.trending-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 15px;
}

#trending-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* -----------------------------------------------------------
   NEWS GRID
----------------------------------------------------------- */
#news-container {
    max-width: 1100px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
}

.news-card {
    background: var(--card-light);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
    padding: 0;
    overflow: hidden;
    transition: 0.3s;
}

.dark-mode .news-card {
    background: var(--card-dark);
    border-color: var(--border-dark);
}

.news-image img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.news-card-content {
    padding: 18px;
}

.news-meta {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
}

.news-card h3 {
    margin: 0 0 10px;
    font-size: 18px;
}

.news-card p {
    font-size: 14px;
    opacity: 0.8;
}

.news-card a {
    display: inline-block;
    margin-top: 10px;
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
}

   <script>
/* -----------------------------------------------------------
   DARK MODE SYSTEM (works on ALL pages)
----------------------------------------------------------- */
function applyTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("dark-toggle").textContent = "☀️";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("dark-toggle").textContent = "🌙";
    }
}

document.addEventListener("DOMContentLoaded", () => {
    applyTheme();

    document.getElementById("dark-toggle").addEventListener("click", () => {
        const isDark = document.body.classList.toggle("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        applyTheme();
    });
});

/* -----------------------------------------------------------
   3‑PROXY FAILOVER SYSTEM (unlimited)
----------------------------------------------------------- */
async function fetchWithFallback(url) {
    const proxies = [
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://cors-anywhere.herokuapp.com/${url}`
    ];

    for (const proxy of proxies) {
        try {
            const res = await fetch(proxy);
            if (res.ok) {
                return await res.text();
            }
        } catch (e) {
            console.warn("Proxy failed:", proxy);
        }
    }

    throw new Error("All proxies failed for: " + url);
}

/* -----------------------------------------------------------
   CATEGORY DETECTION
----------------------------------------------------------- */
function detectCategory(text, source) {
    text = text.toLowerCase();

    if (text.includes("ai") || text.includes("artificial intelligence")) return "ai";
    if (text.includes("space") || text.includes("nasa") || text.includes("spacex")) return "space";
    if (text.includes("science") || text.includes("research")) return "science";
    if (text.includes("programming") || text.includes("developer") || text.includes("javascript")) return "programming";

    return "tech";
}

/* -----------------------------------------------------------
   FALLBACK IMAGE BUILDER
----------------------------------------------------------- */
function buildFallbackImage(category) {
    return `https://dummyimage.com/600x400/1a1a1a/ffffff&text=${category.toUpperCase()}`;
}

/* -----------------------------------------------------------
   EXTRACT IMAGE FROM RSS ITEM
----------------------------------------------------------- */
function extractImageFromItem(item) {
    const media = item.querySelector("media\\:content, content");
    if (media && media.getAttribute("url")) return media.getAttribute("url");

    const desc = item.querySelector("description")?.textContent || "";
    const match = desc.match(/<img[^>]+src="([^"]+)"/);
    return match ? match[1] : null;
}

/* -----------------------------------------------------------
   LOAD SOURCES.JSON
----------------------------------------------------------- */
async function loadSources() {
    try {
        const res = await fetch("sources.json");
        return await res.json();
    } catch {
        return [];
    }
}

/* -----------------------------------------------------------
   GLOBAL NEWS VARIABLES
----------------------------------------------------------- */
let allArticles = [];
let renderedCount = 0;
let currentCategory = "all";
let isLoadingMore = false;
const CHUNK_SIZE = 12;

/* -----------------------------------------------------------
   LOAD NEWS
----------------------------------------------------------- */
async function loadNews() {
    const container = document.getElementById("news-container");
    const trendingList = document.getElementById("trending-list");
    const statusText = document.getElementById("status-text");

    container.innerHTML = "<p>Loading real news…</p>";
    trendingList.innerHTML = "";
    statusText.textContent = "";

    allArticles = [];
    renderedCount = 0;

    const sources = await loadSources();

    for (const url of sources) {
        try {
            const text = await fetchWithFallback(url);

            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");

            items.forEach(item => {
                const title = item.querySelector("title")?.textContent?.trim() || "No title";
                const description = item.querySelector("description")?.textContent?.trim() || "No description";
                const link = item.querySelector("link")?.textContent?.trim() || "#";

                const combined = title + " " + description;
                const category = detectCategory(combined, url);

                let image = extractImageFromItem(item);
                const hasRealImage = !!image;

                if (!image) image = buildFallbackImage(category);

                allArticles.push({
                    title,
                    description,
                    link,
                    category,
                    image,
                    hasRealImage
                });
            });
        } catch (err) {
            console.warn("Source failed:", url);
        }
    }

    /* Remove duplicates */
    const seen = new Set();
    allArticles = allArticles.filter(a => {
        if (seen.has(a.title)) return false;
        seen.add(a.title);
        return true;
    });

    /* TRENDING */
    const trending = allArticles.slice(0, 8);
    trending.forEach(a => {
        const card = document.createElement("div");
        card.className = "trending-card";
        card.style.cursor = "pointer";
        card.onclick = () => window.open(a.link, "_blank");

        card.innerHTML = `
            <strong>${a.title}</strong>
            <div style="font-size:12px;opacity:0.7;">${a.category.toUpperCase()}</div>
        `;

        trendingList.appendChild(card);
    });

    container.innerHTML = "";
    renderMoreArticles();
}

/* -----------------------------------------------------------
   FILTERING
----------------------------------------------------------- */
function getFilteredArticles() {
    if (currentCategory === "all") return allArticles;
    return allArticles.filter(a => a.category === currentCategory);
}

/* -----------------------------------------------------------
   RENDER MORE ARTICLES
----------------------------------------------------------- */
function renderMoreArticles() {
    const container = document.getElementById("news-container");
    const statusText = document.getElementById("status-text");

    const filtered = getFilteredArticles();
    const nextSlice = filtered.slice(renderedCount, renderedCount + CHUNK_SIZE);

    nextSlice.forEach(a => {
        const card = document.createElement("div");
        card.className = "news-card";

        card.innerHTML = `
            <div class="news-image">
                <img src="${a.image}">
            </div>
            <div class="news-card-content">
                <div class="news-meta">${a.category.toUpperCase()}</div>
                <h3>${a.title}</h3>
                <p>${a.description}</p>
                <a href="${a.link}" target="_blank">Read more →</a>
            </div>
        `;

        container.appendChild(card);
    });

    renderedCount += nextSlice.length;

    if (renderedCount >= filtered.length) {
        statusText.textContent = "You reached the end.";
    } else {
        statusText.textContent = "Scroll to load more…";
    }

    isLoadingMore = false;
}

   /* -----------------------------------------------------------
   CATEGORY BUTTONS
----------------------------------------------------------- */
document.querySelectorAll(".category-tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        currentCategory = tab.dataset.category;
        renderedCount = 0;

        document.getElementById("news-container").innerHTML = "";
        document.getElementById("status-text").textContent = "";

        renderMoreArticles();
    });
});

/* -----------------------------------------------------------
   INFINITE SCROLL
----------------------------------------------------------- */
window.addEventListener("scroll", () => {
    if (isLoadingMore) return;

    const scrollPosition = window.innerHeight + window.scrollY;
    const threshold = document.body.offsetHeight - 400;

    if (scrollPosition >= threshold) {
        isLoadingMore = true;
        renderMoreArticles();
    }
});

/* -----------------------------------------------------------
   REFRESH BUTTON
----------------------------------------------------------- */
document.getElementById("refresh-btn").addEventListener("click", () => {
    loadNews();
});

/* -----------------------------------------------------------
   INIT
----------------------------------------------------------- */
loadNews();
</script>

<div id="status-text" style="text-align:center;margin:40px 0;font-weight:600;opacity:0.7;"></div>

</body>
</html>
