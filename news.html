    <style>
        /* ---------------------------------------------------
           GLOBAL THEME
        --------------------------------------------------- */
        :root {
            --bg-light: #f5efe6;
            --bg-light-accent: #fff9f0;
            --text-light: #1a1a1a;
            --card-light: #ffffff;
            --border-light: #e0d4c2;

            --bg-dark: #05060a;
            --bg-dark-accent: #151821;
            --text-dark: #f5f5f5;
            --card-dark: #181b24;
            --border-dark: #2b3140;

            --primary: #c58b3b;
            --primary-soft: rgba(197,139,59,0.12);
            --accent: #ffb347;

            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 9px;

            --shadow-soft: 0 22px 55px rgba(0,0,0,0.16);
            --shadow-card: 0 14px 32px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.85), rgba(245,239,230,0.95)),
                radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(0,0,0,0.08), transparent 55%);
            z-index: -3;
        }

        body.dark-mode::before {
            background:
                radial-gradient(circle at 0% 0%, rgba(197,139,59,0.26), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(80,90,140,0.45), transparent 60%),
                linear-gradient(145deg, #05060a, #10131c);
        }

        /* Floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.55;
            z-index: -2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .blob-1 {
            width: 260px;
            height: 260px;
            background: rgba(197,139,59,0.55);
            top: -60px;
            left: -40px;
            animation: floatBlob1 18s ease-in-out infinite alternate;
        }

        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(255,179,71,0.45);
            bottom: -80px;
            right: -40px;
            animation: floatBlob2 22s ease-in-out infinite alternate;
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,40px) scale(1.1); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-40px,-30px) scale(1.05); }
        }

        /* ---------------------------------------------------
           NAVIGATION
        --------------------------------------------------- */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 7%;
            backdrop-filter: blur(18px);
            background: rgba(253,247,238,0.92);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        body.dark-mode nav {
            background: rgba(10,12,18,0.92);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        nav h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        nav a {
            margin-left: 18px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: inherit;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.2s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        #theme-toggle {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        /* ---------------------------------------------------
           PAGE HEADER
        --------------------------------------------------- */
        .page-header {
            max-width: 1100px;
            margin: 20px auto 10px;
            padding: 0 7%;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            margin: 0 0 6px;
        }

        .page-subtitle {
            margin: 0;
            font-size: 14px;
            opacity: 0.85;
        }

        /* ---------------------------------------------------
           FILTERS
        --------------------------------------------------- */
        .filters {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-input, .select-input {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.9);
            font-size: 13px;
            outline: none;
        }

        body.dark-mode .search-input,
        body.dark-mode .select-input {
            background: rgba(10,12,18,0.95);
            border-color: rgba(255,255,255,0.16);
            color: var(--text-dark);
        }

        /* ---------------------------------------------------
           NEWS GRID
        --------------------------------------------------- */
        .news-grid {
            max-width: 1100px;
            margin: 20px auto 40px;
            padding: 0 7%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 18px;
        }

        .news-card {
            background: var(--card-light);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transform: translateY(14px);
            opacity: 0;
        }

        body.dark-mode .news-card {
            background: var(--card-dark);
            border-color: var(--border-dark);
            box-shadow: 0 16px 40px rgba(0,0,0,0.7);
        }

        .news-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #ddd;
        }

        .news-content {
            padding: 14px 16px 16px;
        }

        .news-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 6px;
        }

        .news-desc {
            font-size: 13px;
            opacity: 0.85;
            margin: 0 0 8px;
        }

        .news-meta {
            font-size: 11px;
            opacity: 0.75;
        }

        .news-btn {
            margin-top: 10px;
            padding: 7px 14px;
            border-radius: 999px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        /* ---------------------------------------------------
           SCROLL REVEAL
        --------------------------------------------------- */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
        }

        .reveal-visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* ---------------------------------------------------
           FOOTER
        --------------------------------------------------- */
        footer {
            margin-top: 40px;
            padding: 24px 7%;
            text-align: center;
            font-size: 12px;
            background: rgba(253,247,238,0.92);
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        body.dark-mode footer {
            background: rgba(8,10,16,0.96);
            border-top-color: rgba(255,255,255,0.08);
        }
    </style>
</head>

<script>
/* ---------------------------------------------------
   DARK MODE SYNC
--------------------------------------------------- */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* ---------------------------------------------------
   FETCH GOOGLE NEWS RSS
--------------------------------------------------- */
const RSS_URL =
    "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en";

async function fetchRSS() {
    const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(RSS_URL));
    const data = await response.json();
    const xml = new window.DOMParser().parseFromString(data.contents, "text/xml");
    return xml.querySelectorAll("item");
}

/* ---------------------------------------------------
   AI IMAGE GENERATION (REALISTIC NEWS STYLE)
--------------------------------------------------- */
async function generateAIImage(title) {
    // Realistic photography-style prompt
    const prompt =
        `Realistic news photography, 720p, professional lighting, detailed, representing: ${title}`;

    // Using a placeholder AI generator (you can replace with your own API)
    return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
}

/* ---------------------------------------------------
   CHECK IMAGE QUALITY
--------------------------------------------------- */
function checkImageQuality(url) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
            resolve(img.width >= 1280 && img.height >= 720);
        };
        img.onerror = () => resolve(false);
        img.src = url;
    });
}

/* ---------------------------------------------------
   RENDER NEWS
--------------------------------------------------- */
async function renderNews() {
    const grid = document.getElementById("news-grid");
    grid.innerHTML = ""; // remove skeletons

    const items = await fetchRSS();

    let newsList = [];

    items.forEach(item => {
        const title = item.querySelector("title")?.textContent || "Untitled";
        const link = item.querySelector("link")?.textContent || "#";
        const pubDate = item.querySelector("pubDate")?.textContent || "";
        const description = item.querySelector("description")?.textContent || "";

        // Extract image from <media:thumbnail> or inside description
        let imgUrl = "";
        const media = item.getElementsByTagName("media:thumbnail")[0];
        if (media) imgUrl = media.getAttribute("url");

        // Fallback: extract from description HTML
        if (!imgUrl && description.includes("img")) {
            const match = description.match(/src="(.*?)"/);
            if (match) imgUrl = match[1];
        }

        newsList.push({
            title,
            link,
            pubDate,
            description,
            imgUrl
        });
    });

    // Process each article
    for (const article of newsList) {
        let finalImage = article.imgUrl;

        // If no image or low quality → generate AI image
        if (!finalImage || !(await checkImageQuality(finalImage))) {
            finalImage = await generateAIImage(article.title);
        }

        // Create card
        const card = document.createElement("div");
        card.className = "news-card reveal";

        card.innerHTML = `
            <img class="news-img" src="${finalImage}" alt="News Image">

            <div class="news-content">
                <h3 class="news-title">${article.title}</h3>
                <p class="news-desc">${article.description.slice(0, 140)}...</p>
                <div class="news-meta">${new Date(article.pubDate).toLocaleString()}</div>

                <button class="news-btn" onclick="window.open('${article.link}', '_blank')">
                    Read full article →
                </button>
            </div>
        `;

        grid.appendChild(card);
    }

    applyFilters 
       <script>
/* ---------------------------------------------------
   1. Magnetic Buttons
--------------------------------------------------- */
document.addEventListener("mousemove", () => {
    document.querySelectorAll(".news-btn").forEach(btn => {
        btn.addEventListener("mousemove", (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            btn.style.transform = `translate(${x * 0.08}px, ${y * 0.08}px)`;
        });

        btn.addEventListener("mouseleave", () => {
            btn.style.transform = "translate(0,0)";
        });
    });
});

/* ---------------------------------------------------
   2. Card Tilt Effect
--------------------------------------------------- */
document.querySelectorAll(".news-card").forEach(card => {
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        card.style.transform = `rotateX(${y * -6}deg) rotateY(${x * 6}deg) scale(1.02)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "rotateX(0) rotateY(0) scale(1)";
    });
});

/* ---------------------------------------------------
   3. Soft Floating Animations
--------------------------------------------------- */
function floatElement(el, intensity = 6, speed = 3000) {
    let y = 0;
    let direction = 1;

    setInterval(() => {
        y += direction * 0.4;
        if (Math.abs(y) >= intensity) direction *= -1;
        el.style.transform = `translateY(${y}px)`;
    }, speed / 120);
}

setTimeout(() => {
    document.querySelectorAll(".news-card").forEach(card => {
        floatElement(card, 3, 2600);
    });
}, 1500);

/* ---------------------------------------------------
   4. Section Fade‑In Chain
--------------------------------------------------- */
const sections = document.querySelectorAll(".page-header, .filters, .news-grid");

sections.forEach((section, index) => {
    section.style.opacity = 0;
    section.style.transform = "translateY(20px)";
    setTimeout(() => {
        section.style.transition = "opacity 0.8s ease, transform 0.8s ease";
        section.style.opacity = 1;
        section.style.transform = "translateY(0)";
    }, 200 + index * 200);
});

/* ---------------------------------------------------
   5. Parallax Effect for Blobs
--------------------------------------------------- */
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;

    document.querySelector(".blob-1").style.transform = `translate(${x}px, ${y}px)`;
    document.querySelector(".blob-2").style.transform = `translate(${-x}px, ${-y}px)`;
});

/* ---------------------------------------------------
   6. Easter Egg (Konami Code)
--------------------------------------------------- */
let konami = [];
const secret = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];

document.addEventListener("keydown", (e) => {
    konami.push(e.key);
    if (konami.length > secret.length) konami.shift();

    if (JSON.stringify(konami) === JSON.stringify(secret)) {
        alert("🎉 Secret unlocked! You're a real developer, Alae.");
    }
});

/* ---------------------------------------------------
   7. Performance‑Safe Scroll Throttle
--------------------------------------------------- */
let ticking = false;

window.addEventListener("scroll", () => {
    if (!ticking) {
        window.requestAnimationFrame(() => {
            ticking = false;
        });
        ticking = true;
    }
});
</script>
