<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlaeAI — Latest Tech & AI News</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ---------------------------------------------------
           THEME VARIABLES (MATCH HOME PAGE)
        --------------------------------------------------- */
        :root {
            --bg-light: #f5efe6;
            --bg-light-2: #fff9f0;
            --text-light: #1a1a1a;
            --card-light: #ffffff;
            --border-light: #e0d4c2;

            --bg-dark: #05060a;
            --bg-dark-2: #0d0f15;
            --text-dark: #f5f5f5;
            --card-dark: #181b24;
            --border-dark: #2b3140;

            --primary: #c58b3b;
            --primary-soft: rgba(197,139,59,0.12);

            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 10px;

            --shadow-soft: 0 22px 55px rgba(0,0,0,0.16);
            --shadow-card: 0 14px 32px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* ---------------------------------------------------
           FLOATING BLOBS
        --------------------------------------------------- */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.55;
            z-index: -2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .blob-1 {
            width: 260px;
            height: 260px;
            background: rgba(197,139,59,0.55);
            top: -60px;
            left: -40px;
            animation: floatBlob1 18s ease-in-out infinite alternate;
        }

        .blob-2 {
            width: 280px;
            height: 280px;
            background: rgba(255,179,71,0.45);
            bottom: -80px;
            right: -40px;
            animation: floatBlob2 22s ease-in-out infinite alternate;
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,40px) scale(1.1); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-40px,-30px) scale(1.05); }
        }

        /* ---------------------------------------------------
           NAVIGATION
        --------------------------------------------------- */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 7%;
            backdrop-filter: blur(18px);
            background: rgba(253,247,238,0.92);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        body.dark-mode nav {
            background: rgba(10,12,18,0.92);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        nav h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        nav a {
            margin-left: 18px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: inherit;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.2s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        #theme-toggle {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        /* ---------------------------------------------------
           HERO SECTION
        --------------------------------------------------- */
        .hero {
            padding: 90px 7% 60px;
            text-align: center;
            max-width: 900px;
            margin: auto;
        }

        .hero-title {
            font-family: 'Poppins', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .hero-subtitle {
            font-size: 16px;
            opacity: 0.85;
            max-width: 600px;
            margin: auto;
        }

        /* ---------------------------------------------------
           NEWS GRID
        --------------------------------------------------- */
        .news-grid {
            max-width: 1100px;
            margin: 40px auto 60px;
            padding: 0 7%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 22px;
        }

        .news-card {
            background: var(--card-light);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }

        body.dark-mode .news-card {
            background: var(--card-dark);
            border-color: var(--border-dark);
            box-shadow: 0 16px 40px rgba(0,0,0,0.7);
        }

        .news-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .news-content {
            padding: 16px 18px 20px;
        }

        .news-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .news-desc {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 10px;
        }

        .news-btn {
            margin-top: 12px;
            padding: 8px 16px;
            border-radius: 999px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        /* ---------------------------------------------------
           SCROLL REVEAL
        --------------------------------------------------- */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
        }

        .reveal-visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* ---------------------------------------------------
           FOOTER
        --------------------------------------------------- */
        footer {
            margin-top: 40px;
            padding: 24px 7%;
            text-align: center;
            font-size: 12px;
            background: rgba(253,247,238,0.92);
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        body.dark-mode footer {
            background: rgba(8,10,16,0.96);
            border-top-color: rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>

<!-- FLOATING BLOBS -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- NAVIGATION -->
<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="news.html">News</a>
        <a href="tools.html">Tools</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<!-- HERO SECTION -->
<section class="hero reveal">
    <h2 class="hero-title">Latest Tech & AI News</h2>
    <p class="hero-subtitle">
        Powered by Gemini AI — real‑time news fetched directly from the internet.
    </p>
</section>

<!-- NEWS GRID -->
<div id="news-container" class="news-grid"></div>

<!-- FOOTER -->
<footer>
    © 2026 AlaeAI — All rights reserved.
</footer>

<!-- GEMINI AI SCRIPT -->
<script>
async function getNews(topic) {
  const apiKey ="AIzaSyD5zAYBtUSxVzV3tMtTKbBC-FXDQ2t1m5M";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          {
            role: "user",
            parts: [
              {
                text: `Search the internet for the latest news about "${topic}". 
Return ONLY JSON in this format:

{
  "articles": [
    {
      "title": "",
      "summary": "",
      "url": "",
      "image": ""
    }
  ]
}`
              }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();
  const text = data.candidates[0].content.parts[0].text;

  return JSON.parse(text);
}

async function loadNews() {
  const topic = "technology";
  const news = await getNews(topic);

  const container = document.getElementById("news-container");
  container.innerHTML = "";

  news.articles.forEach(article => {
    container.innerHTML += `
      <div class="news-card reveal">
        <img class="news-img" src="${article.image}" />
        <div class="news-content">
          <h3 class="news-title">${article.title}</h3>
          <p class="news-desc">${article.summary}</p>
          <a href="${article.url}" target="_blank">
            <button class="news-btn">Read More</button>
          </a>
        </div>
      </div>
    `;
  });

  revealOnScroll();
}

function revealOnScroll() {
  const reveals = document.querySelectorAll(".reveal");
  reveals.forEach((el) => {
    el.classList.add("reveal-visible");
  });
}

loadNews();
</script>

</body>
</html>
