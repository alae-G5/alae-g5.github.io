<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6065282700750014"
     crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlaeAI — Tools</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg-light: #f5efe6;
        --bg-light-accent: #fff9f0;
        --text-light: #1a1a1a;
        --card-light: #ffffff;
        --border-light: #e0d4c2;

        --bg-dark: #0b0c10;
        --bg-dark-accent: #151821;
        --text-dark: #f5f5f5;
        --card-dark: #181b24;
        --border-dark: #2b3140;

        --primary: #c58b3b;
        --primary-soft: rgba(197,139,59,0.12);

        --radius-lg: 18px;
        --radius-md: 12px;
        --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg-light);
        color: var(--text-light);
        transition: background 0.4s ease, color 0.4s ease;
    }

    body.dark-mode {
        background: var(--bg-dark);
        color: var(--text-dark);
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.8), rgba(245,239,230,0.9)),
            radial-gradient(circle at 0% 0%, rgba(197,139,59,0.18), transparent 55%),
            radial-gradient(circle at 100% 100%, rgba(0,0,0,0.06), transparent 55%);
        z-index: -2;
    }

    body.dark-mode::before {
        background:
            radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
            radial-gradient(circle at 100% 100%, rgba(80,90,140,0.35), transparent 60%),
            linear-gradient(145deg, #05060a, #10131c);
    }

    nav {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 7%;
        backdrop-filter: blur(18px);
        background: rgba(253,247,238,0.85);
        border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    body.dark-mode nav {
        background: rgba(10,12,18,0.88);
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    nav h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 24px;
        font-weight: 700;
    }

    nav a {
        margin-left: 22px;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        color: inherit;
        position: relative;
    }

    nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0;
        height: 2px;
        background: var(--primary);
        transition: width 0.2s ease;
    }

    nav a:hover::after {
        width: 100%;
    }

    #theme-toggle {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.9);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
    }

    body.dark-mode #theme-toggle {
        background: rgba(15,17,25,0.95);
        border-color: rgba(255,255,255,0.12);
        color: var(--text-dark);
    }

    .page {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 7%;
    }

    h2 {
        font-family: 'Poppins', sans-serif;
        font-size: 28px;
        margin-bottom: 20px;
    }

    .tool-card {
        background: var(--card-light);
        border: 2px solid var(--border-light);
        border-radius: var(--radius-md);
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 10px 26px rgba(0,0,0,0.06);
    }

    body.dark-mode .tool-card {
        background: var(--card-dark);
        border-color: var(--border-dark);
        box-shadow: 0 14px 32px rgba(0,0,0,0.55);
    }

    textarea {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius-md);
        border: 2px solid var(--border-light);
        font-size: 15px;
        background: var(--bg-light-accent);
    }

    body.dark-mode textarea {
        background: var(--bg-dark-accent);
        border-color: var(--border-dark);
        color: var(--text-dark);
    }

    button {
        padding: 10px 18px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        filter: brightness(1.05);
    }

    .output {
        margin-top: 12px;
        padding: 12px;
        background: var(--bg-light-accent);
        border-radius: var(--radius-md);
        border: 1px solid var(--border-light);
        white-space: pre-wrap;
    }

    body.dark-mode .output {
        background: var(--bg-dark-accent);
        border-color: var(--border-dark);
    }

    footer {
        margin-top: 60px;
        padding: 30px 7%;
        text-align: center;
        font-size: 13px;
        background: rgba(253,247,238,0.9);
        border-top: 1px solid rgba(0,0,0,0.06);
    }

    body.dark-mode footer {
        background: rgba(8,10,16,0.95);
        border-top-color: rgba(255,255,255,0.08);
    }
    </style>
</head>

<body>

<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="tools.html">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<div class="page">
    <h2>AI Tools</h2>

    <!-- TEXT GENERATOR -->
    <div class="tool-card">
        <h3>AI Text Generator</h3>
        <p>Generate smart text based on your prompt.</p>
        <textarea id="text-input" placeholder="Write a topic or idea..."></textarea>
        <button onclick="generateText()">Generate Text</button>
        <div id="text-output" class="output"></div>
    </div>

    <!-- IDEA GENERATOR -->
    <div class="tool-card">
        <h3>Idea Generator</h3>
        <p>Get unlimited creative ideas for apps, games, and projects.</p>
        <button onclick="generateIdea()">Generate Idea</button>
        <div id="idea-output" class="output"></div>
    </div>

    <!-- CODE FORMATTER -->
    <div class="tool-card">
        <h3>Code Formatter</h3>
        <p>Format messy code into clean, readable code.</p>
        <textarea id="code-input" placeholder="Paste your messy code here..."></textarea>
        <button onclick="formatCode()">Format Code</button>
        <div id="code-output" class="output"></div>
    </div>
</div>

<footer>
    © 2026 AlaeAI — All Rights Reserved
</footer>

<script>
/* GLOBAL THEME SYSTEM */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* TEXT GENERATOR */
function generateText() {
    const input = document.getElementById("text-input").value.trim();
    if (!input) {
        document.getElementById("text-output").innerText = "Please write a topic first.";
        return;
    }

    const styles = [
        t => `Here’s a short scene:\n\nA teacher looked at the student. “${t},” she said softly, “is something we can improve together.”`,
        t => `Creative paragraph:\n\nThe room was quiet. “Let’s talk about ${t},” the teacher said with a calm smile.`,
        t => `Natural text:\n\n“I know ${t} feels stressful,” she said, “but this is just the beginning.”`,
        t => `Detailed version:\n\nDuring their discussion about ${t}, the teacher focused on progress, not mistakes.`
    ];

    const result = styles[Math.floor(Math.random() * styles.length)](input);
    document.getElementById("text-output").innerText = result;
}

/* IDEA GENERATOR */
function generateIdea() {
    const topics = ["AI", "coding", "games", "education", "robots", "apps", "security", "science"];
    const actions = ["build", "create", "design", "invent", "develop", "upgrade"];
    const outputs = [
        "a tool that helps people learn faster",
        "a system that solves a real problem",
        "a platform that makes life easier",
        "a game that teaches something fun",
        "an app that saves time"
    ];

    const idea = `Create a ${topics[Math.floor(Math.random()*topics.length)]} project where you ${actions[Math.floor(Math.random()*actions.length)]} ${outputs[Math.floor(Math.random()*outputs.length)]}.`;

    document.getElementById("idea-output").innerText = idea;
}

/* CODE FORMATTER */
function formatCode() {
    let code = document.getElementById("code-input").value;
    if (!code.trim()) {
        document.getElementById("code-output").innerText = "Please paste some code first.";
        return;
    }

    code = code.trim();
    const indentStyles = ["    ", "  ", "\t"];
    const chosenIndent = indentStyles[Math.floor(Math.random() * indentStyles.length)];
    const spaceBeforeBrace = Math.random() > 0.5 ? " " : "";
    const spaceAfterComma = Math.random() > 0.5 ? " " : "";

    let formatted = "";
    let indent = 0;

    for (let i = 0; i < code.length; i++) {
        let char = code[i];

        if (char === "}") {
            indent--;
            formatted += "\n" + chosenIndent.repeat(indent) + char;
        }
        else if (char === "{") {
            formatted += spaceBeforeBrace + char + "\n";
            indent++;
            formatted += chosenIndent.repeat(indent);
        }
        else if (char === ";") {
            formatted += char + "\n" + chosenIndent.repeat(indent);
        }
        else if (char === ",") {
            formatted += "," + spaceAfterComma;
        }
        else {
            formatted += char;
        }
    }

    document.getElementById("code-output").innerText = formatted;
}
</script>

</body>
</html>
